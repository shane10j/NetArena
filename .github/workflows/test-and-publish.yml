name: Test and Publish Agent

on:
  pull_request:
  push:
    branches:
      - main
      - eesha
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v1.1.0

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    # These permissions are required for the workflow to:
    # - Read repository contents (checkout code)
    # - Write to GitHub Container Registry (push Docker images)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true
          platforms: linux/amd64

      - name: Start agent container
        env:
            SECRETS_JSON: ${{ toJson(secrets) }}
            IMAGE_TAG: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
            NEBIUS_API_KEY: ${{ secrets.NEBIUS_API_KEY }}
            MODEL_NAME: "openai/Qwen/Qwen3-Next-80B-A3B-Thinking"
            NEBIUS_API_BASE_URL: "https://api.tokenfactory.nebius.com/v1/"
        run: |
          if [ -z "$NEBIUS_API_KEY" ]; then
            echo "NEBIUS_API_KEY GitHub secret is required for the configured Qwen model." >&2
            exit 1
          fi
          echo "$SECRETS_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' > .env
          {
            echo "MODEL_NAME=$MODEL_NAME"
            echo "OPENAI_API_KEY=$NEBIUS_API_KEY"
            echo "OPENAI_API_BASE=$NEBIUS_API_BASE_URL"
            echo "LITELLM_API_KEY=$NEBIUS_API_KEY"
            echo "LITELLM_API_BASE_URL=$NEBIUS_API_BASE_URL"
          } >> .env
          if [ -z "$IMAGE_TAG" ]; then
            echo "Docker metadata action did not produce an image tag." >&2
            exit 1
          fi
          echo "Starting agent container from $IMAGE_TAG"
          docker run -d -p 9009:9009 --name agent-container --env-file .env "$IMAGE_TAG" --host 0.0.0.0 --port 9009
          timeout 30 bash -c 'until curl -sf http://localhost:9009/.well-known/agent-card.json > /dev/null; do sleep 1; done'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install test dependencies
        run: uv sync --extra test

      - name: Run tests
      