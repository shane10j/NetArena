name: Test and Publish Agent

on:
  pull_request:
  push:
    branches:
      - main
      - eesha
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v1.1.0

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    # These permissions are required for the workflow to:
    # - Read repository contents (checkout code)
    # - Write to GitHub Container Registry (push Docker images)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true
          platforms: linux/amd64

      - name: Start agent container
        env:
            SECRETS_JSON: ${{ toJson(secrets) }}
            IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
            NEBIUS_API_KEY: ${{ secrets.NEBIUS_API_KEY }}
            MODEL_NAME: "openai/Qwen/Qwen3-Next-80B-A3B-Thinking"
            NEBIUS_API_BASE_URL: "https://api.tokenfactory.nebius.com/v1/"
        run: |
          if [ -z "$NEBIUS_API_KEY" ]; then
            echo "NEBIUS_API_KEY GitHub secret is required for the configured Qwen model." >&2
            exit 1
          fi
          echo "$SECRETS_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' > .env
          {
            echo "MODEL_NAME=$MODEL_NAME"
            echo "OPENAI_API_KEY=$NEBIUS_API_KEY"
            echo "OPENAI_API_BASE=$NEBIUS_API_BASE_URL"
            echo "LITELLM_API_KEY=$NEBIUS_API_KEY"
            echo "LITELLM_API_BASE_URL=$NEBIUS_API_BASE_URL"
          } >> .env
          IMAGE_TAG="$(printf '%s\n' "$IMAGE_TAGS" | head -n 1)"
          if [ -z "$IMAGE_TAG" ]; then
            echo "Docker metadata action did not produce an image tag." >&2
            exit 1
          fi
          echo "Starting agent container from $IMAGE_TAG"
          docker run -d -p 9009:9009 --name agent-container --env-file .env "$IMAGE_TAG" --host 0.0.0.0 --port 9009
          timeout 30 bash -c 'until curl -sf http://localhost:9009/.well-known/agent-card.json > /dev/null; do sleep 1; done'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install test dependencies
        run: uv sync --extra test

      - name: Run tests
        run: |
          uv run pytest -v --agent-url http://localhost:9009

      - name: Stop container and show logs
        if: always()
        run: |
          echo "=== Agent Container Logs ==="
          docker logs agent-container || true
          docker stop agent-container || true

      - name: Run NetArena green-agent benchmark
        if: success() && github.event_name != 'pull_request'
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          NEBIUS_API_KEY: ${{ secrets.NEBIUS_API_KEY }}
          MODEL_NAME: "openai/Qwen/Qwen3-Next-80B-A3B-Thinking"
          NEBIUS_API_BASE_URL: "https://api.tokenfactory.nebius.com/v1/"
          BENCHMARK_NUM_TASKS: "3"
        run: |
          if [ -z "$NEBIUS_API_KEY" ]; then
            echo "NEBIUS_API_KEY GitHub secret is required for the NetArena benchmark." >&2
            exit 1
          fi
          if [ ! -f netarena_leaderboard/generate_compose.py ]; then
            echo "netarena_leaderboard submodule is missing generate_compose.py." >&2
            echo "Check that the submodule URL is reachable and checkout used submodules: recursive." >&2
            exit 1
          fi

          python -m pip install tomli tomli-w pyyaml requests
          cd netarena_leaderboard

          python - <<'PY'
          import os
          from pathlib import Path

          import tomli
          import tomli_w

          scenario_path = Path("malt_scenario.toml")
          if scenario_path.exists():
              scenario = tomli.loads(scenario_path.read_text())
          else:
              scenario = {
                  "green_agent": {
                      "agentbeats_id": "019ba416-0462-7cf2-86f0-bf85123df8a4",
                      "env": {"LOG_LEVEL": "INFO"},
                  },
                  "config": {"num_tasks": int(os.getenv("BENCHMARK_NUM_TASKS", "3"))},
              }

          image_tag = os.environ["IMAGE_TAGS"].splitlines()[0]

          scenario["participants"] = [
              {
                  "image": image_tag,
                  "name": "k8s_operator",
                  "env": {
                      "MODEL_NAME": os.environ["MODEL_NAME"],
                      "OPENAI_API_KEY": "${OPENAI_API_KEY}",
                      "OPENAI_API_BASE": os.environ["NEBIUS_API_BASE_URL"],
                      "LITELLM_API_KEY": "${OPENAI_API_KEY}",
                      "LITELLM_API_BASE_URL": os.environ["NEBIUS_API_BASE_URL"],
                  },
              }
          ]

          scenario.setdefault("green_agent", {})
          scenario["green_agent"].setdefault(
              "agentbeats_id", "019ba416-0462-7cf2-86f0-bf85123df8a4"
          )
          scenario["green_agent"].setdefault("env", {"LOG_LEVEL": "INFO"})
          scenario.setdefault("config", {})
          scenario["config"].setdefault("num_tasks", int(os.getenv("BENCHMARK_NUM_TASKS", "3")))

          Path("ci_malt_scenario.toml").write_text(tomli_w.dumps(scenario))
          PY

          # This workflow is a CI dry run against the Docker image built in this job.
          # The leaderboard helper blocks image-based participants when it sees
          # GITHUB_ACTIONS, because official submissions must use agentbeats_id.
          # Unset it only for compose generation so this remains local image testing.
          env -u GITHUB_ACTIONS python generate_compose.py --scenario ci_malt_scenario.toml --app malt
          {
            echo "OPENAI_API_KEY=$NEBIUS_API_KEY"
            echo "MODEL_NAME=$MODEL_NAME"
            echo "OPENAI_API_BASE=$NEBIUS_API_BASE_URL"
            echo "LITELLM_API_KEY=$NEBIUS_API_KEY"
            echo "LITELLM_API_BASE_URL=$NEBIUS_API_BASE_URL"
          } > .env
          mkdir -p output
          timeout 45m docker compose up --timestamps --no-color --exit-code-from agentbeats-client --abort-on-container-exit

      - name: Summarize NetArena benchmark metrics
        if: always() && github.event_name != 'pull_request'
        run: |
          python - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          output_dir = Path("netarena_leaderboard/output")
          print("## NetArena Benchmark Results")
          if not output_dir.exists():
              print("")
              print("No `netarena_leaderboard/output` directory was produced.")
              raise SystemExit(0)

          json_files = sorted(output_dir.rglob("*.json"))
          if not json_files:
              print("")
              print("No JSON result files were found under `netarena_leaderboard/output`.")
              raise SystemExit(0)

          interesting = {
              "correctness",
              "avg_correctness",
              "final_correctness",
              "safety",
              "avg_safety",
              "final_safety",
              "latency",
              "avg_latency",
              "iterations",
              "avg_iterations",
              "final_iterations",
          }

          def walk(value, prefix=""):
              if isinstance(value, dict):
                  for key, item in value.items():
                      path = f"{prefix}.{key}" if prefix else key
                      if key in interesting and isinstance(item, (int, float, str)):
                          yield path, item
                      yield from walk(item, path)
              elif isinstance(value, list):
                  for index, item in enumerate(value):
                      yield from walk(item, f"{prefix}[{index}]")

          for path in json_files:
              print("")
              print(f"### `{path}`")
              try:
                  data = json.loads(path.read_text())
              except Exception as exc:
                  print(f"Could not parse JSON: {exc}")
                  continue
              metrics = list(walk(data))
              if metrics:
                  for key, value in metrics:
                      print(f"- `{key}`: {value}")
              else:
                  print("- No correctness/safety/latency metrics found by key scan.")
          PY

      - name: Upload NetArena benchmark output
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: netarena-benchmark-output
          path: netarena_leaderboard/output
          if-no-files-found: warn

      - name: Log in to GitHub Container Registry
        if: success() && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: success() && github.event_name != 'pull_request'
        run: docker push --all-tags ghcr.io/${GITHUB_REPOSITORY,,}

      - name: Output image digest
        if: success() && github.event_name != 'pull_request'
        run: |
          echo "## Docker Image Published :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
